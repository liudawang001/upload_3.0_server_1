# 木林森图片上传客户端配置文件
# MLS Image Upload Client Configuration

# 服务器配置
# 上传服务端地址。不要在末尾添加 /api，客户端代码会自动拼接 /api/...
server.url=http://192.168.30.114:8081
server.timeout=30000

# 上传配置
upload.chunk.size=1048576
upload.thread.pool.size=5
upload.max.retry.count=3
upload.retry.delay=1000
# 花型图上传成功后是否请求服务端执行CLIP特征提取
upload.feature.extraction.enabled=true

# 日志配置
log.level=INFO
log.file.path=logs/client.log
log.max.file.size=10MB
log.max.history=30

# 界面配置
ui.theme=default
ui.language=zh_CN
ui.window.width=1200
ui.window.height=1000
ui.window.resizable=true

# 文件配置
file.temp.dir=temp
file.supported.extensions=jpg,jpeg,png,bmp,gif,tiff
file.max.size=50MB

# 数据库配置（如果需要本地缓存）
cache.enabled=false
cache.max.size=1000
cache.expire.time=3600

# 安全配置
security.token.expire.time=7200
security.auto.logout.time=1800

# 其他配置
app.name=木林森图片上传系统
app.version=1.0.0
app.author=MLS Development Team
app.update.check.enabled=true
app.update.check.url=http://192.168.30.114:8081/api/version/check

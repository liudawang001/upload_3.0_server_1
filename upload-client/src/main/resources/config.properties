# 木林森图片上传客户端配置文件
# 配置文件版本: 1.0.0
# 创建时间: 2024-01-01

# ==================== 服务器配置 ====================
# 服务器主机地址
server.host=192.168.30.114
# 服务器端口
server.port=8081
# 通信协议
server.protocol=http
# 上传服务端基础URL。不要包含/api，客户端代码会自动拼接/api路径。
server.base.url=${server.protocol}://${server.host}:${server.port}

# ==================== API接口配置 ====================
# 用户登录接口
api.login=/auth/login
# 文件上传接口
api.upload=/file/upload
# 数据查询接口
api.data.query=/data/query

# ==================== 文件上传配置 ====================
# 上传分块大小（字节）- 1MB
upload.chunk.size=1048576
# 上传重试次数
upload.retry.times=3
# 花型图上传成功后是否请求服务端执行CLIP特征提取
upload.feature.extraction.enabled=true
# 上传超时时间（毫秒）- 30秒
upload.timeout=30000
# 并发上传数量
upload.concurrent.count=5
# 支持的图片格式
upload.supported.formats=jpg,jpeg,png,bmp,gif

# ==================== 界面配置 ====================
# 界面主题
ui.theme=default
# 界面语言
ui.language=zh_CN
# 窗口标题
ui.window.title=木林森信息上传客户端 v1.0.0
# 窗口默认宽度
ui.window.width=1000
# 窗口默认高度
ui.window.height=700
# 窗口最小宽度
ui.window.min.width=800
# 窗口最小高度
ui.window.min.height=600

# ==================== 日志配置 ====================
# 日志级别
log.level=INFO
# 日志文件路径
log.file.path=logs/upload-client.log
# 日志文件最大大小（MB）
log.file.max.size=10
# 日志文件保留天数
log.file.max.days=30

# ==================== 缓存配置 ====================
# 缓存目录
cache.dir=cache
# 缓存过期时间（小时）
cache.expire.hours=24
# 最大缓存大小（MB）
cache.max.size=100

# ==================== 系统配置 ====================
# 应用程序名称
app.name=木林森图片上传客户端
# 应用程序版本
app.version=1.0.0
# 开发团队
app.developer=MLS Development Team
# 版权信息
app.copyright=Copyright © 2024 木林森. All rights reserved.

# ==================== 特殊功能配置 ====================
# 是否启用自动备份
backup.enabled=true
# 备份目录
backup.dir=backup
# 备份保留天数
backup.retain.days=7

# 是否启用断点续传
resume.upload.enabled=true
# 断点续传临时文件目录
resume.temp.dir=temp

# 是否启用Excel数据验证
excel.validation.enabled=true
# Excel最大行数限制
excel.max.rows=10000
